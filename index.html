<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#15171c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Fitness Coach">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Fitness Coach</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="root"><div style="padding:40px 20px;color:#8b93a1;font-family:sans-serif;font-size:15px;">Lädt…</div></main>
  <footer>FITNESS COACH · LOKALE PWA · WEWER / PADERBORN</footer>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      var root = document.getElementById("root");
      if (root) root.innerHTML = '<div style="padding:32px 20px;color:#ff5a1f;font-family:sans-serif;"><b>Fehler beim Laden</b><br><span style="font-size:13px;color:#8b93a1;">' + String(msg) + '</span></div>';
    };
    window.addEventListener("unhandledrejection", function(ev) {
      var root = document.getElementById("root");
      var msg = ev.reason && ev.reason.message ? ev.reason.message : String(ev.reason);
      if (root && root.textContent.trim() === "Lädt…") root.innerHTML = '<div style="padding:32px 20px;color:#ff5a1f;font-family:sans-serif;"><b>Fehler beim Laden</b><br><span style="font-size:13px;color:#8b93a1;">' + msg + '</span></div>';
    });
  </script>
  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
