<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#15171c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Fitness Coach">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Fitness Coach</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="root"><div style="padding:40px 20px;color:#8b93a1;font-family:sans-serif;font-size:15px;">Lädt…</div></main>
  <div id="menuContainer">
    <button id="menuBtn" class="menu-btn" aria-label="Menü öffnen" aria-expanded="false">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <circle cx="9" cy="3" r="1.6" fill="currentColor"/>
        <circle cx="9" cy="9" r="1.6" fill="currentColor"/>
        <circle cx="9" cy="15" r="1.6" fill="currentColor"/>
      </svg>
    </button>
    <div id="menuDropdown" class="menu-dropdown" role="menu">
      <button class="menu-item" data-action="strava" role="menuitem">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
          <path d="M8.5 1.5L4.5 8.5H8L6.5 13.5l7-8H9.5L8.5 1.5z" fill="currentColor"/>
        </svg>
        Strava Verbindung
      </button>
      <button class="menu-item" data-action="data" role="menuitem">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
          <rect x="1.5" y="1.5" width="12" height="3" rx="1" stroke="currentColor" stroke-width="1.3"/>
          <rect x="1.5" y="5.5" width="12" height="8" rx="1" stroke="currentColor" stroke-width="1.3"/>
          <path d="M5 9.5h5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        Daten &amp; Backup
      </button>
      <button class="menu-item" data-action="settings" role="menuitem">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
          <path d="M2 4h11M5 4a2 2 0 1 0 0-3 2 2 0 0 0 0 3zM2 11h11M10 11a2 2 0 1 0 0-3 2 2 0 0 0 0 3z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        Einstellungen
      </button>
    </div>
  </div>
  <footer>FITNESS COACH · LOKALE PWA · WEWER / PADERBORN</footer>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      var root = document.getElementById("root");
      if (root) root.innerHTML = '<div style="padding:32px 20px;color:#ff5a1f;font-family:sans-serif;"><b>Fehler beim Laden</b><br><span style="font-size:13px;color:#8b93a1;">' + String(msg) + '</span></div>';
    };
    window.addEventListener("unhandledrejection", function(ev) {
      var root = document.getElementById("root");
      var msg = ev.reason && ev.reason.message ? ev.reason.message : String(ev.reason);
      if (root && root.textContent.trim() === "Lädt…") root.innerHTML = '<div style="padding:32px 20px;color:#ff5a1f;font-family:sans-serif;"><b>Fehler beim Laden</b><br><span style="font-size:13px;color:#8b93a1;">' + msg + '</span></div>';
    });
  </script>
  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
